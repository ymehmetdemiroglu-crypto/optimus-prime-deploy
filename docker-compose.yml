version: '3.8'

services:
  # ===================================================
  # 1. API Server (FastAPI + Semantic Engine)
  # ===================================================
  api:
    build: .
    container_name: optimus-api
    ports:
      - "8000:8000"
    env_file:
      - ./grok-admaster/server/.env
    environment:
      - DATABASE_URL=postgresql://optimus:${DB_PASSWORD:-optimus_secure}@db:5432/optimus_pryme
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      - REDIS_URL=redis://redis:6379/0
      - ENV=production
      # n8n MCP server URL (for chat agent to trigger n8n workflows via MCP)
      - N8N_MCP_URL=http://n8n:5678/mcp/optimus-n8n-mcp/sse
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===================================================
  # 2. Autonomous Operator (The AI Pilot)
  #    Runs as a separate process from the API.
  # ===================================================
  operator:
    build: .
    container_name: optimus-operator
    command: [ "python", "autonomous_operator.py", "--interval", "6" ]
    env_file:
      - ./grok-admaster/server/.env
    environment:
      - DATABASE_URL=postgresql://optimus:${DB_PASSWORD:-optimus_secure}@db:5432/optimus_pryme
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - ENV=production
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: always

  # ===================================================
  # 3. PostgreSQL with pgvector (The Memory)
  # ===================================================
  db:
    image: pgvector/pgvector:pg16
    container_name: optimus-db
    environment:
      - POSTGRES_USER=optimus
      - POSTGRES_PASSWORD=${DB_PASSWORD:-optimus_secure}
      - POSTGRES_DB=optimus_pryme
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Auto-run the semantic schema on first boot
      - ./grok-admaster/server/migrations/06_semantic_schema.sql:/docker-entrypoint-initdb.d/06_semantic_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U optimus -d optimus_pryme" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===================================================
  # 4. Redis (Scheduler State + Caching)
  # ===================================================
  redis:
    image: redis:7-alpine
    container_name: optimus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # ===================================================
  # 5. n8n Workflow Orchestrator
  #    Connects to Optimus Prime API for automated
  #    optimization, anomaly response, and reporting.
  # ===================================================
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: optimus-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-optimus_n8n}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=optimus_pryme
      - DB_POSTGRESDB_USER=optimus
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD:-optimus_secure}
      - DB_POSTGRESDB_SCHEMA=n8n
      - N8N_CUSTOM_EXTENSIONS=/home/node/.n8n/custom
      # Optimus Prime API connection (used in n8n credentials)
      - OPTIMUS_API_URL=http://api:8000
      # MCP SSE Bridge for n8n to consume Optimus MCP tools
      - MCP_BRIDGE_HOST=mcp-bridge
      - MCP_BRIDGE_URL=http://mcp-bridge:3001/sse
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/nodes:/home/node/.n8n/custom/nodes
      - ./n8n/credentials:/home/node/.n8n/custom/credentials
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
      mcp-bridge:
        condition: service_started
    restart: always

  # ===================================================
  # 6. MCP SSE Bridge
  #    Exposes Optimus MCP tools (Cortex + DSP) over SSE
  #    so n8n's MCP Client can consume them.
  # ===================================================
  mcp-bridge:
    build: .
    container_name: optimus-mcp-bridge
    command: [ "python", "-m", "app.mcp.sse_bridge", "--port", "3001" ]
    env_file:
      - ./grok-admaster/server/.env
    environment:
      - DATABASE_URL=postgresql://optimus:${DB_PASSWORD:-optimus_secure}@db:5432/optimus_pryme
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - ENV=production
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: always
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  n8n_data:
